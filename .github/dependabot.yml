version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: sha2
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /apps/viewer-web
    schedule:
      interval: weekly
