name: deploy-origin

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    outputs:
      conformance_run_id: ${{ steps.qualify.outputs.conformance_run_id }}
      conformance_run_attempt: ${{ steps.qualify.outputs.conformance_run_attempt }}
    steps:
      - name: Require successful conformance for this exact main commit
        id: qualify
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            run="$({ gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/workflows/ci.yml/runs?event=push&head_sha=${SOURCE_COMMIT}&per_page=10"; } | \
              jq -c --arg sha "$SOURCE_COMMIT" \
                '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | last // empty')"
            if [[ -n "$run" ]]; then
              status="$(jq -r '.status' <<<"$run")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run")"
              run_id="$(jq -r '.id' <<<"$run")"
              run_attempt="$(jq -r '.run_attempt' <<<"$run")"
              echo "Conformance run ${run_id} attempt ${run_attempt}: ${status}/${conclusion:-pending}"
              if [[ "$status" == "completed" ]]; then
                if [[ "$conclusion" != "success" ]]; then
                  echo "::error::Conformance run ${run_id} concluded ${conclusion} for ${SOURCE_COMMIT}"
                  exit 1
                fi
                echo "conformance_run_id=${run_id}" >> "$GITHUB_OUTPUT"
                echo "conformance_run_attempt=${run_attempt}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              echo "Waiting for conformance run for ${SOURCE_COMMIT}"
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for successful conformance for ${SOURCE_COMMIT}"
          exit 1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Require the qualified commit to be current main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin refs/heads/main:refs/remotes/origin/main
          tested="$(git rev-parse HEAD)"
          current="$(git rev-parse refs/remotes/origin/main)"
          if [[ "$tested" != "$current" ]]; then
            echo "::error::Refusing stale Pages build: qualified $tested, current main $current"
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer-web/package-lock.json
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - run: npm ci
        working-directory: apps/viewer-web
      - run: npm test
        working-directory: apps/viewer-web
      - run: npm run build
        working-directory: apps/viewer-web
      - name: Bind the release attestation to the successful conformance run
        working-directory: apps/viewer-web
        env:
          TESSARYN_SOURCE_COMMIT: ${{ github.sha }}
          TESSARYN_REPOSITORY: ${{ github.repository }}
          TESSARYN_CONFORMANCE_RUN_ID: ${{ steps.qualify.outputs.conformance_run_id }}
          TESSARYN_CONFORMANCE_RUN_ATTEMPT: ${{ steps.qualify.outputs.conformance_run_attempt }}
          TESSARYN_DEPLOYMENT_RUN_ID: ${{ github.run_id }}
          TESSARYN_DEPLOYMENT_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: node scripts/write-release-attestation.mjs
      - name: Refuse publication if main advanced during the build
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin refs/heads/main:refs/remotes/origin/main
          tested="$(git rev-parse HEAD)"
          current="$(git rev-parse refs/remotes/origin/main)"
          if [[ "$tested" != "$current" ]]; then
            echo "::error::Refusing stale Pages publication: qualified $tested, current main $current"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/viewer-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy TESSARYN Origin
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  verify-live:
    name: verify live release
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    env:
      TESSARYN_LIVE_ORIGIN: ${{ needs.deploy.outputs.page_url }}
      TESSARYN_EXPECTED_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Verify live release attestation and authority bytes
        run: node apps/viewer-web/scripts/verify-live-release.mjs
