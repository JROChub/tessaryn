name: deploy-origin

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/viewer-web/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
        working-directory: apps/viewer-web
      - run: npm test
        working-directory: apps/viewer-web
      - run: npm run build
        working-directory: apps/viewer-web
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/viewer-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy TESSARYN Origin
        id: deployment
        uses: actions/deploy-pages@v4
