name: deploy-origin

on:
  workflow_run:
    workflows: [conformance]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
      - name: Require the qualified commit to be current main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin refs/heads/main:refs/remotes/origin/main
          tested="$(git rev-parse HEAD)"
          current="$(git rev-parse refs/remotes/origin/main)"
          if [[ "$tested" != "$current" ]]; then
            echo "::error::Refusing stale Pages build: qualified $tested, current main $current"
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer-web/package-lock.json
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - run: npm ci
        working-directory: apps/viewer-web
      - run: npm test
        working-directory: apps/viewer-web
      - run: npm run build
        working-directory: apps/viewer-web
      - name: Bind the release attestation to the successful conformance run
        working-directory: apps/viewer-web
        env:
          TESSARYN_SOURCE_COMMIT: ${{ github.event.workflow_run.head_sha }}
          TESSARYN_REPOSITORY: ${{ github.repository }}
          TESSARYN_CONFORMANCE_RUN_ID: ${{ github.event.workflow_run.id }}
          TESSARYN_CONFORMANCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          TESSARYN_DEPLOYMENT_RUN_ID: ${{ github.run_id }}
          TESSARYN_DEPLOYMENT_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: node scripts/write-release-attestation.mjs
      - name: Refuse publication if main advanced during the build
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin refs/heads/main:refs/remotes/origin/main
          tested="$(git rev-parse HEAD)"
          current="$(git rev-parse refs/remotes/origin/main)"
          if [[ "$tested" != "$current" ]]; then
            echo "::error::Refusing stale Pages publication: qualified $tested, current main $current"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/viewer-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy TESSARYN Origin
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  verify-live:
    name: verify live release
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    env:
      TESSARYN_LIVE_ORIGIN: ${{ needs.deploy.outputs.page_url }}
      TESSARYN_EXPECTED_COMMIT: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Verify live release attestation and authority bytes
        run: node apps/viewer-web/scripts/verify-live-release.mjs
