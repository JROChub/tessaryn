name: Browser World Cell assurance

on:
  pull_request:
    paths:
      - "tools/browser-assurance/**"
      - ".github/workflows/browser-assurance.yml"
  push:
    branches:
      - main
      - agent/world-cell-consensus-theater
    paths:
      - "tools/browser-assurance/**"
      - ".github/workflows/browser-assurance.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assurance-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Configure Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown
          rustup default stable
          rustc --version
          cargo --version
      - name: Apply reviewed FFI lint corrections
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'push' && github.ref_name == 'agent/world-cell-consensus-theater')
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/browser-assurance/src/lib.rs')
          source = path.read_text()
          source = source.replace(
              'use ed25519_dalek::{Signature, Signer, SigningKey, Verifier, VerifyingKey};',
              'use ed25519_dalek::{Signature, Signer, SigningKey, VerifyingKey};',
          )
          source = source.replace(
              'const SHA256_PREFIX: &str = "sha256:";',
              '#[cfg(test)]\nconst SHA256_PREFIX: &str = "sha256:";',
          )
          source = source.replace(
              '#[no_mangle]\npub unsafe extern "C" fn tessaryn_assurance_dealloc',
              '''/// Releases a buffer previously returned by [`tessaryn_assurance_alloc`].
///
/// # Safety
///
/// `pointer` must be the exact pointer returned by `tessaryn_assurance_alloc`, and
/// `capacity` must be the allocation length supplied to that call. The buffer must
/// not be used after this function returns.
#[no_mangle]
pub unsafe extern "C" fn tessaryn_assurance_dealloc''',
          )
          source = source.replace(
              '#[no_mangle]\npub unsafe extern "C" fn tessaryn_assurance_seal',
              '''/// Seals canonical World Cell bytes and writes the JSON seal to the result buffer.
///
/// # Safety
///
/// Every non-null input pointer must remain readable for its corresponding length
/// for the duration of this call. The three input regions must contain canonical
/// Cell bytes, UTF-8 evidence JSON, and an exact 32-byte seed respectively.
#[no_mangle]
pub unsafe extern "C" fn tessaryn_assurance_seal''',
          )
          source = source.replace(
              '#[no_mangle]\npub unsafe extern "C" fn tessaryn_assurance_verify',
              '''/// Verifies a canonical World Cell, its evidence, and a browser assurance seal.
///
/// # Safety
///
/// Every non-null input pointer must remain readable for its corresponding length
/// for the duration of this call. Evidence and seal inputs must contain UTF-8 JSON.
#[no_mangle]
pub unsafe extern "C" fn tessaryn_assurance_verify''',
          )
          path.write_text(source)
          PY
          cargo fmt --manifest-path tools/browser-assurance/Cargo.toml
      - name: Commit reviewed FFI lint corrections
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'push' && github.ref_name == 'agent/world-cell-consensus-theater')
        run: |
          if git diff --quiet -- tools/browser-assurance/src/lib.rs; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/browser-assurance/src/lib.rs
          git commit -m "document browser assurance FFI safety"
          git push origin HEAD:agent/world-cell-consensus-theater
      - name: Format
        run: cargo fmt --manifest-path tools/browser-assurance/Cargo.toml --check
      - name: Clippy
        shell: bash
        run: |
          set +e
          cargo clippy --manifest-path tools/browser-assurance/Cargo.toml --all-targets -- -D warnings > browser-assurance-clippy.log 2>&1
          status=$?
          cat browser-assurance-clippy.log
          exit $status
      - name: Upload clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-assurance-clippy-${{ github.run_id }}-${{ github.run_attempt }}
          path: browser-assurance-clippy.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Native assurance tests
        shell: bash
        run: |
          set +e
          cargo test --manifest-path tools/browser-assurance/Cargo.toml > browser-assurance-test.log 2>&1
          status=$?
          cat browser-assurance-test.log
          exit $status
      - name: Upload native test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-assurance-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: browser-assurance-test.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Build browser assurance WebAssembly
        run: cargo build --manifest-path tools/browser-assurance/Cargo.toml --release --target wasm32-unknown-unknown
      - name: Assemble and validate artifact
        run: |
          mkdir -p build-browser-assurance
          cp tools/browser-assurance/target/wasm32-unknown-unknown/release/tessaryn_browser_assurance.wasm build-browser-assurance/tessaryn-browser-assurance-v1.wasm
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const bytes = await readFile('build-browser-assurance/tessaryn-browser-assurance-v1.wasm');
          const module = await WebAssembly.compile(bytes);
          const exports = WebAssembly.Module.exports(module).map(({ name }) => name);
          for (const name of [
            'memory',
            'tessaryn_assurance_alloc',
            'tessaryn_assurance_dealloc',
            'tessaryn_assurance_seal',
            'tessaryn_assurance_verify',
            'tessaryn_assurance_result_pointer',
            'tessaryn_assurance_result_length',
            'tessaryn_assurance_error_pointer',
            'tessaryn_assurance_error_length',
          ]) {
            if (!exports.includes(name)) throw new Error(`missing assurance export ${name}`);
          }
          NODE
          SOURCE_COMMIT="$(git rev-parse HEAD)" python3 - <<'PY'
          import hashlib, json, os, pathlib
          root = pathlib.Path('build-browser-assurance')
          path = root / 'tessaryn-browser-assurance-v1.wasm'
          data = path.read_bytes()
          manifest = {
              'schema': 'tessaryn.browser-assurance-provenance/v1',
              'profile': 'eform/world-cell-assurance/v1',
              'provider': 'tessaryn-browser-assurance::ed25519-dalek/2.2.0',
              'power_house_version': '0.3.24',
              'source_repository': 'JROChub/tessaryn',
              'source_commit': os.environ['SOURCE_COMMIT'],
              'artifact': {
                  'name': path.name,
                  'bytes': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              },
          }
          (root / 'manifest.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          PY
          cat build-browser-assurance/manifest.json
      - name: Upload browser assurance bundle
        uses: actions/upload-artifact@v4
        with:
          name: browser-world-cell-assurance-${{ github.run_id }}-${{ github.run_attempt }}
          path: build-browser-assurance
          if-no-files-found: error
          retention-days: 90
