name: Build merged exact Keyxym v0.22 runtime

on:
  pull_request:
    paths:
      - ".github/workflows/build-keyxym-merged-exact.yml"
      - "validation/keyxym-v22/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-merged-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Require exact merged Keyxym source blobs
        run: bash validation/keyxym-v22/verify-private-blobs.sh
      - name: Install checksum-verified official Emscripten 6.0.3 package
        run: |
          set -euo pipefail
          url='https://storage.googleapis.com/webassembly/emscripten-releases-builds/linux/9074aa513b501925adb1361e208932ad32a29a5f/wasm-binaries.tar.xz'
          curl --fail --location --retry 8 --retry-all-errors \
            --connect-timeout 15 --max-time 900 "$url" -o /tmp/wasm-binaries.tar.xz
          echo '3f32b91a3f8d405846ccacee911f9364da75f413fbd11ea1f3f7f23bf9d07cf3  /tmp/wasm-binaries.tar.xz' | sha256sum -c -
          mkdir -p /tmp/emscripten-6.0.3
          tar -xJf /tmp/wasm-binaries.tar.xz -C /tmp/emscripten-6.0.3 --strip-components=1
          printf '/tmp/emscripten-6.0.3/bin\n/tmp/emscripten-6.0.3/emscripten\n' >> "$GITHUB_PATH"
      - name: Build and execute merged-source WebAssembly authority
        run: |
          emcc --version | tee /tmp/emcc-version.txt
          grep -q '6.0.3' /tmp/emcc-version.txt
          emcmake cmake -S validation/keyxym-v22 -B /tmp/keyxym-merged-wasm -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/keyxym-merged-wasm --target keyxym-v22 --parallel 2
          node validation/keyxym-v22/tests/test_v022_wasm.mjs \
            /tmp/keyxym-merged-wasm/keyxym-v22.mjs \
            /tmp/keyxym-merged-wasm/keyxym-v22.wasm | tee /tmp/keyxym-merged-runtime-result.json
      - name: Create merged-source provenance manifest
        run: |
          python3 - <<'PY'
          import hashlib, json, pathlib
          root = pathlib.Path('/tmp/keyxym-merged-wasm')
          artifacts = {}
          for name in ('keyxym-v22.mjs', 'keyxym-v22.wasm'):
              data = (root / name).read_bytes()
              artifacts[name] = {'bytes': len(data), 'sha256': hashlib.sha256(data).hexdigest()}
          manifest = {
              'schema': 'keyxym.browser-runtime-provenance/v4',
              'version': '0.22.0',
              'abi': 'keyxym-v22-browser-dual-field-4',
              'perception_abi': 'keyxym-v22-unified-cpp-frontend-v1',
              'source_repository': 'JROChub/keyxym_map',
              'source_commit': '5187ff10dfb63d4abbfee51ab894451efe428490',
              'source_exact': True,
              'derivation': 'source-exact-external-validation-build',
              'maximum_surfels': 48000,
              'maximum_analysis_width': 320,
              'maximum_analysis_height': 240,
              'maximum_tracks': 384,
              'maximum_preview_samples': 8192,
              'timestamp_abi': 'wasm-bigint-i64',
              'feature_record_floats': 6,
              'preview_record_floats': 10,
              'geometry_record_floats': 13,
              'receipt_bytes': 64,
              'toolchain': {
                  'name': 'Emscripten',
                  'version': '6.0.3',
                  'release_commit': '9074aa513b501925adb1361e208932ad32a29a5f',
                  'official_package_sha256': '3f32b91a3f8d405846ccacee911f9364da75f413fbd11ea1f3f7f23bf9d07cf3',
              },
              'validation': {
                  'exact_blob_matrix_run': 29412516894,
                  'gcc': True,
                  'asan_ubsan': True,
                  'msvc': True,
                  'mobile_sdk': True,
                  'wasm_runtime': True,
              },
              'artifacts': artifacts,
          }
          pathlib.Path('/tmp/keyxym-merged-manifest.json').write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          PY
          cat /tmp/keyxym-merged-manifest.json
      - name: Upload merged-source authority bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: keyxym-v22-merged-exact-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/keyxym-merged-wasm/keyxym-v22.mjs
            /tmp/keyxym-merged-wasm/keyxym-v22.wasm
            /tmp/keyxym-merged-manifest.json
            /tmp/keyxym-merged-runtime-result.json
            /tmp/emcc-version.txt
          if-no-files-found: error
          retention-days: 30
