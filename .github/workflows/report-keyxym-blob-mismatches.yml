name: Report exact Keyxym blob mismatches

on:
  pull_request:
    paths:
      - "validation/keyxym-v22/**"
      - ".github/workflows/report-keyxym-blob-mismatches.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Record complete private blob comparison
        id: compare
        shell: bash
        run: |
          set +e
          KEYXYM_BLOB_REPORT=/tmp/keyxym-private-blob-report.txt \
            bash validation/keyxym-v22/verify-private-blobs.sh
          status=$?
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload complete blob report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: keyxym-private-blob-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/keyxym-private-blob-report.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce exact private blobs
        run: test '${{ steps.compare.outputs.status }}' = 0
