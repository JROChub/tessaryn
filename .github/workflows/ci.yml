name: conformance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: cargo test --workspace --locked
      - run: cargo run --locked -q -p tessaryn-cli -- generate-demo /tmp/vesper-court.json
      - run: diff -u apps/viewer-web/public/world/vesper-court.json /tmp/vesper-court.json
      - run: sha256sum -c conformance/SHA256SUMS
      - run: cargo run --locked -q -p tessaryn-cli -- verify-demo apps/viewer-web/public/world/vesper-court.json > /tmp/vesper-court.verify.json
      - run: diff -u conformance/expected/vesper-court.verify.json /tmp/vesper-court.verify.json
      - run: cargo run --locked -q -p tessaryn-cli -- challenge-demo apps/viewer-web/public/world/vesper-court.json > /tmp/vesper-court.challenge.json
      - run: diff -u conformance/expected/vesper-court.challenge.json /tmp/vesper-court.challenge.json
      - run: ./scripts/check-no-map-substrate.sh

  reproducibility:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - name: Regenerate the canonical Origin
        run: cargo run --locked -q -p tessaryn-cli -- generate-demo generated-vesper-court.json
      - name: Require byte-identical canonical state
        run: git diff --no-index --exit-code -- apps/viewer-web/public/world/vesper-court.json generated-vesper-court.json
      - name: Verify the regenerated Origin offline
        run: cargo run --locked -q -p tessaryn-cli -- verify-demo generated-vesper-court.json

  viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/viewer-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
