name: Apply World Cell authority ready state fix

on:
  push:
    paths:
      - ".github/workflows/apply-world-cell-ready-state.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.ref == 'refs/heads/fix/world-cell-authority-ready-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/world-cell-authority-ready-state
      - name: Apply exact ready-state transition and regression assertion
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('apps/viewer-web/src/world-cell-theater.ts')
          text = source.read_text()
          before = '''    setText("compute-state", "KEYXYM");
    setText("cell-state", "WORLD CELL / READY / RELATIVE");'''
          after = '''    setText("compute-state", "KEYXYM");
    setText("pose-state", "KEYXYM READY");
    setText("cell-state", "WORLD CELL / READY / RELATIVE");'''
          if text.count(before) != 1:
              raise SystemExit('initial ready-state insertion point changed')
          text = text.replace(before, after, 1)
          if text.count('    setText("pose-state", "ORIGIN");') != 1:
              raise SystemExit('reset ready-state insertion point changed')
          text = text.replace(
              '    setText("pose-state", "ORIGIN");',
              '    setText("pose-state", "KEYXYM READY");',
              1,
          )
          source.write_text(text)

          spec = Path('apps/viewer-web/e2e/keyxym-v22-authority.spec.ts')
          text = spec.read_text()
          before = '  await expect(page.locator("#compute-state")).toHaveText("KEYXYM");\n'
          after = before + '  await expect(page.locator("#pose-state")).toHaveText("KEYXYM READY");\n'
          if text.count(before) != 1:
              raise SystemExit('Playwright ready-state insertion point changed')
          spec.write_text(text.replace(before, after, 1))
          PY
          rm .github/workflows/apply-world-cell-ready-state.yml
          git diff --check
      - name: Commit product fix
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/viewer-web/src/world-cell-theater.ts \
            apps/viewer-web/e2e/keyxym-v22-authority.spec.ts \
            .github/workflows/apply-world-cell-ready-state.yml
          git commit -m "Fix verified Keyxym ready state"
          git push origin HEAD:fix/world-cell-authority-ready-state
