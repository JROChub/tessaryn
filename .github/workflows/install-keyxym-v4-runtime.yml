name: Install audited Keyxym v4 runtime

on:
  pull_request:
    paths:
      - ".github/workflows/install-keyxym-v4-runtime.yml"
      - ".artifact-transfer/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
      - name: Reconstruct and verify audited runtime
        run: |
          set -euo pipefail
          cat \
            .artifact-transfer/keyxym-v22.wasm.xz.part-00 \
            .artifact-transfer/keyxym-v22.wasm.xz.part-01 \
            | base64 --decode > /tmp/keyxym-v22.wasm.xz
          echo "3471dd2710759ded36f5c80f5db58af194f947d8196050a74230bf9dd5cd37a8  /tmp/keyxym-v22.wasm.xz" | sha256sum -c -
          xz --decompress --stdout /tmp/keyxym-v22.wasm.xz > apps/viewer-web/public/keyxym/keyxym-v22.wasm
          test "$(wc -c < apps/viewer-web/public/keyxym/keyxym-v22.wasm)" = 48184
          echo "3e2464e6be15a335d90c57c34d3066d5c265460eb9fe4166c5ed3f879f1c5f11  apps/viewer-web/public/keyxym/keyxym-v22.wasm" | sha256sum -c -
          echo "e9867b1979eeb9dc5109c3882b5c10d2bb81d23faa38fcfd6b6bd18c707035d4  apps/viewer-web/public/keyxym/keyxym-v22.mjs" | sha256sum -c -
          echo "200ef484caf2bdfd158d4bfe3b3dbd94fab6577d5e7787b597e113662b6b1421  apps/viewer-web/public/keyxym/manifest.json" | sha256sum -c -
          echo "fb73f660feb2d03c4aa102a90380f5ea688d85a1ea7532a1c84f9d0be1324a23  apps/viewer-web/public/keyxym/build-closure.json" | sha256sum -c -
      - name: Exercise compiled browser authority
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises';
          import path from 'node:path';
          import { pathToFileURL } from 'node:url';
          import crypto from 'node:crypto';

          const root = path.resolve('apps/viewer-web/public/keyxym');
          const wasmBytes = new Uint8Array(await fs.readFile(path.join(root, 'keyxym-v22.wasm')));
          await WebAssembly.compile(wasmBytes);
          const { default: createModule } = await import(pathToFileURL(path.join(root, 'keyxym-v22.mjs')).href);
          const mod = await createModule({
            noInitialRun: true,
            instantiateWasm(imports, receiveInstance) {
              WebAssembly.instantiate(wasmBytes, imports).then(({ instance }) => receiveInstance(instance));
              return {};
            },
          });
          for (const name of [
            '_keyxym_v22_browser_session_create',
            '_keyxym_v22_browser_session_destroy',
            '_keyxym_v22_browser_ingest_rgba_packed',
            '_keyxym_v22_browser_copy_receipts',
            '_keyxym_v22_browser_copy_preview_packed',
            '_keyxym_v22_browser_geometry_revision',
            '_keyxym_v22_browser_copy_geometry_snapshot_packed',
            '_keyxym_v22_session_quality_packed',
          ]) {
            if (typeof mod[name] !== 'function') throw new Error(`missing ${name}`);
          }
          const OK = 0, INVALID = 1, BUFFER_TOO_SMALL = 2;
          const mallocBytes = bytes => {
            const pointer = mod._malloc(Math.max(1, bytes.length));
            mod.HEAPU8.set(bytes, pointer);
            return pointer;
          };
          const floats = count => mod._malloc(Math.max(4, count * 4));
          const u32 = pointer => new DataView(mod.HEAPU8.buffer).getUint32(pointer, true);
          const u64 = pointer => new DataView(mod.HEAPU8.buffer).getBigUint64(pointer, true);
          const copyFloats = (pointer, count) => mod.HEAPF32.slice(pointer >>> 2, (pointer >>> 2) + count);
          const commitment = bytes => new Uint8Array(crypto.createHash('sha256').update(bytes).digest());
          const textured = (width, height, shift) => {
            const rgba = new Uint8Array(width * height * 4);
            for (let y = 0; y < height; y++) for (let x = 0; x < width; x++) {
              const sx = x - shift;
              const checker = ((Math.trunc(sx / 5) ^ Math.trunc(y / 5)) & 1);
              let detail = (sx * sx + y * y + sx * y) % 53;
              if (detail < 0) detail += 53;
              const value = checker ? 190 + detail % 50 : 25 + detail;
              const offset = (y * width + x) * 4;
              rgba[offset] = value;
              rgba[offset + 1] = Math.trunc(value * 3 / 4);
              rgba[offset + 2] = 255 - Math.trunc(value / 2);
              rgba[offset + 3] = 255;
            }
            return rgba;
          };

          const branch = mallocBytes(new TextEncoder().encode('browser-consensus\0'));
          const sessionOutput = mod._malloc(4);
          let session = 0;
          try {
            const status = mod._keyxym_v22_browser_session_create(
              branch, 0.02, 48000, 320, 240, 384, 8192, sessionOutput,
            );
            if (status !== OK) throw new Error(`session create failed ${status}`);
            session = u32(sessionOutput);
          } finally {
            mod._free(branch);
            mod._free(sessionOutput);
          }
          if (!session) throw new Error('null Keyxym session');

          const width = 640, height = 480, posePointer = floats(22);
          const frames = [textured(width, height, 0), textured(width, height, 8), textured(width, height, 16)];
          let pose;
          try {
            for (let index = 0; index < frames.length; index++) {
              const rgba = frames[index];
              const digest = commitment(rgba);
              const rgbaPointer = mallocBytes(rgba);
              const digestPointer = mallocBytes(digest);
              try {
                const status = mod._keyxym_v22_browser_ingest_rgba_packed(
                  session, BigInt((index + 1) * 1_000_000), width, height,
                  520, 520, 320, 240, 1, 0,
                  rgbaPointer, rgba.byteLength, digestPointer, 32, posePointer, 22,
                );
                if (status !== OK) throw new Error(`ingest ${index + 1} failed ${status}`);
                pose = copyFloats(posePointer, 22);
                if (mod._keyxym_v22_browser_geometry_revision(session) !== BigInt(index + 1)) {
                  throw new Error('geometry revision mismatch');
                }
              } finally {
                mod._free(rgbaPointer);
                mod._free(digestPointer);
              }
            }
            if (!pose || pose[16] < 12 || pose[17] < 10 || pose[21] !== 1) {
              throw new Error(`pose recovery failed: ${Array.from(pose ?? [])}`);
            }

            const required = mod._malloc(4);
            const receipts = mod._malloc(64);
            try {
              let status = mod._keyxym_v22_browser_copy_receipts(session, 0, 0, required);
              if (status !== BUFFER_TOO_SMALL || u32(required) !== 64) throw new Error('receipt probe failed');
              status = mod._keyxym_v22_browser_copy_receipts(session, receipts, 64, required);
              if (status !== OK || mod.HEAPU8.slice(receipts, receipts + 64).every(value => value === 0)) {
                throw new Error('receipt copy failed');
              }
            } finally {
              mod._free(required);
              mod._free(receipts);
            }

            const previewRequired = mod._malloc(4);
            try {
              const status = mod._keyxym_v22_browser_copy_preview_packed(session, 0, 0, previewRequired);
              const count = u32(previewRequired);
              if (status !== BUFFER_TOO_SMALL || count === 0 || count % 10 !== 0) {
                throw new Error(`preview probe failed ${status}/${count}`);
              }
            } finally {
              mod._free(previewRequired);
            }

            const geometryRequired = mod._malloc(4);
            const revisionPointer = mod._malloc(8);
            try {
              let status = mod._keyxym_v22_browser_copy_geometry_snapshot_packed(
                session, 0, 0, geometryRequired, revisionPointer,
              );
              const count = u32(geometryRequired);
              if (status !== BUFFER_TOO_SMALL || count / 13 !== 227 || u64(revisionPointer) !== 3n) {
                throw new Error(`geometry probe failed ${status}/${count}/${u64(revisionPointer)}`);
              }
            } finally {
              mod._free(geometryRequired);
              mod._free(revisionPointer);
            }

            const rgba = frames[2], digest = commitment(rgba);
            const rgbaPointer = mallocBytes(rgba), digestPointer = mallocBytes(digest);
            try {
              const status = mod._keyxym_v22_browser_ingest_rgba_packed(
                session, 3_000_000n, width, height, 520, 520, 320, 240, 1, 0,
                rgbaPointer, rgba.byteLength, digestPointer, 32, posePointer, 22,
              );
              if (status !== INVALID) throw new Error(`replayed timestamp accepted ${status}`);
            } finally {
              mod._free(rgbaPointer);
              mod._free(digestPointer);
            }
          } finally {
            mod._free(posePointer);
            mod._keyxym_v22_browser_session_destroy(session);
          }
          console.log('KEYXYM_V4_INSTALL_OK');
          NODE
      - name: Commit final runtime and remove staging infrastructure
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          rm -f apps/viewer-web/public/keyxym/keyxym-frontend-v1.wasm
          rm -f .artifact-transfer/keyxym-v22.wasm.part-00
          rm -f .artifact-transfer/keyxym-v22.wasm.xz.part-00
          rm -f .artifact-transfer/keyxym-v22.wasm.xz.part-01
          rm -f .github/workflows/emscripten-toolchain-courier.yml
          rm -f .github/workflows/install-keyxym-v4-runtime.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "install audited Keyxym v4 browser runtime"
          git push origin "HEAD:${HEAD_BRANCH}"
