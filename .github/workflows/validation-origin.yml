name: validation-origin-reproduction

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 1 * *"

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /var/tmp/tessaryn-tartanair-cache
          key: tartanair-archviz-p000-9bea5fca-83e6e680-v1
      - run: TESSARYN_REPRO_DIR=/var/tmp/tessaryn-tartanair-cache ./scripts/reproduce-validation-origin.sh
