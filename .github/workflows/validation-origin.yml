name: validation-origin-reproduction

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 1 * *"

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/tmp/tessaryn-tartanair-cache
          key: tartanair-archviz-p000-9bea5fca-83e6e680-v1
      - run: TESSARYN_REPRO_DIR=/var/tmp/tessaryn-tartanair-cache ./scripts/reproduce-validation-origin.sh
