name: Validate exact eform World Cell branch

on:
  pull_request:
    paths:
      - "validation/eform/**"
      - ".github/workflows/validate-eform-exact.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-eform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configure installed Rust toolchain
        run: |
          set -euo pipefail
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version --verbose
          cargo --version
      - name: Require byte-identical private branch sources
        run: |
          set -euo pipefail
          test "$(git hash-object validation/eform/src/lib.rs)" = c29a75feee0c7feacdb98fbe32ec7b2d425235be
          test "$(git hash-object validation/eform/src/main.rs)" = 900b8dd56c22f11067fee0ec1bbcdf7b005e8555
          test "$(git hash-object validation/eform/src/world_cell.rs)" = e212061472ea70d9669ecffabf1309e4a9e313cd
          test "$(git hash-object validation/eform/tests/world_cell.rs)" = 3cb8a0fbdd12a0a48c5add9dc719909eb72f0445
          test "$(git hash-object validation/eform/tests/world_cell_cli.rs)" = 1b425d2d3aa5b074661aeac8d180882013f67185
          test "$(git hash-object validation/eform/tests/world_cell_vector.rs)" = f9c9b50fac67d02fa3d56c804a0361d94e71e89f
      - name: Resolve pinned Power House dependency
        working-directory: validation/eform
        run: cargo generate-lockfile
      - name: Normalize temporary validation copy and record rustfmt patch
        run: |
          set -euo pipefail
          cargo fmt --manifest-path validation/eform/Cargo.toml --all
          git diff -- validation/eform | tee /tmp/eform-rustfmt.patch
          if test -s /tmp/eform-rustfmt.patch; then
            printf 'EFORM_FORMAT_DIRTY=1\n' >> "$GITHUB_ENV"
          else
            printf 'EFORM_FORMAT_DIRTY=0\n' >> "$GITHUB_ENV"
          fi
          tar -czf /tmp/eform-rustfmt-output.tar.gz \
            validation/eform/src validation/eform/tests /tmp/eform-rustfmt.patch
      - name: Upload exact rustfmt output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-eform-rustfmt-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/eform-rustfmt-output.tar.gz
          if-no-files-found: error
          retention-days: 7
      - name: Clippy
        working-directory: validation/eform
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Documentation
        working-directory: validation/eform
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked
      - name: Tests
        working-directory: validation/eform
        run: cargo test --all-targets --locked
      - name: Startup self-test
        working-directory: validation/eform
        run: cargo run --locked -- self-test
      - name: Require fail-closed production activation
        working-directory: validation/eform
        run: cargo run --locked -- activation-report | grep 'approved=false'
      - name: Release build and release self-test
        working-directory: validation/eform
        run: |
          cargo build --release --locked
          cargo run --release --locked -- self-test
      - name: Require clean private source formatting
        if: always()
        run: |
          if test "${EFORM_FORMAT_DIRTY:-1}" != 0; then
            cat /tmp/eform-rustfmt.patch
            exit 1
          fi
