name: real-origin-reproduction

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 1 * *"

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /tmp/tessaryn-real-origin
          key: tum-freiburg1-desk-e983d683-v1
      - run: ./scripts/reproduce-real-origin.sh /tmp/tessaryn-real-origin
