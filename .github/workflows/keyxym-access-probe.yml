name: Keyxym repository access probe

on:
  pull_request:
    paths:
      - ".github/workflows/keyxym-access-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Probe sibling repository without reading content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/JROChub/keyxym_map/contents/wasm/CMakeLists.txt?ref=agent/world-cell-consensus-engine')"
          echo "repository_scope_status=${status}"
          case "$status" in
            200|403|404) ;;
            *) exit 1 ;;
          esac
