name: v0.22 Metric World Cell
run-name: v0.22 Metric World Cell / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-proof:
    name: v0.22 release proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/viewer-web/package-lock.json
      - name: Require v0.22 release marker
        shell: bash
        run: |
          grep -Fx '0.22.0' VERSION
          grep -F 'version: 22' apps/viewer-web/src/world-cell-theater.ts
          test -f apps/viewer-web/src/metric-reconstruction.ts
      - name: Install viewer dependencies
        working-directory: apps/viewer-web
        run: npm ci
      - name: Run viewer tests
        working-directory: apps/viewer-web
        run: npm test
      - name: Build metric World Cell Theater
        working-directory: apps/viewer-web
        run: npm run build
      - name: Require v0.22 production route
        shell: bash
        run: |
          test -f apps/viewer-web/dist/world-cell-theater.html
          grep -F 'METRIC WORLD CELL' apps/viewer-web/dist/world-cell-theater.html
      - name: Upload v0.22 release proof
        uses: actions/upload-artifact@v4
        with:
          name: v022-release-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            VERSION
            apps/viewer-web/dist/world-cell-theater.html
          if-no-files-found: error
