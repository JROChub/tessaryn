server {
    listen 80;
    listen [::]:80;
    server_name __TESSARYN_WEAVE_DOMAIN__;

    server_tokens off;
    client_max_body_size 5m;
    client_body_timeout 30s;
    keepalive_timeout 30s;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /v1/uploads {
        limit_req zone=tessaryn_weave_admission burst=5 nodelay;
        limit_conn tessaryn_weave_connections 4;
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 30s;
    }

    location ~ "^/v1/uploads/upl_[a-f0-9]{64}/chunks/[0-9]+$" {
        limit_req zone=tessaryn_weave_chunks burst=24 nodelay;
        limit_conn tessaryn_weave_connections 6;
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 90s;
    }

    location /v1/ {
        limit_conn tessaryn_weave_connections 12;
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        return 404;
    }
}
