[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2024-0388", reason = "Arkworks 0.4 transitively uses derivative; this is an unmaintained notice, not a vulnerability, and is tracked in docs/dependency-risk-register.md" },
  { id = "RUSTSEC-2024-0436", reason = "Arkworks 0.4 transitively uses paste; this is an unmaintained notice, not a vulnerability, and is tracked in docs/dependency-risk-register.md" },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "AGPL-3.0-only",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
skip = [
  { crate = "syn@1.0.109", reason = "Arkworks 0.4 procedural macros require syn 1 while current workspace macros use syn 2" },
]

[[bans.deny]]
name = "mapbox-gl"

[[bans.deny]]
name = "maplibre-gl"

[[bans.deny]]
name = "google-maps"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
