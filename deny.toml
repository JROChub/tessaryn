[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[[bans.deny]]
name = "mapbox-gl"

[[bans.deny]]
name = "maplibre-gl"

[[bans.deny]]
name = "google-maps"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

